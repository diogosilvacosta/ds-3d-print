<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Pro + Calculadora | DS 3D PRINT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0c0c0c; --red: #ff4d4d; --card: #161616; --text: #e0e0e0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .admin-panel { max-width: 500px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #222; }
        h2, h3 { color: var(--red); text-align: center; margin-top: 0; text-transform: uppercase; }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: none; box-sizing: border-box; font-size: 1rem; }
        input, select { background: #1a1a1a; color: white; border: 1px solid #333; }
        label { font-size: 0.7rem; color: #888; display: block; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        button { background: var(--red); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .hidden { display: none; }
        
        /* CALCULADORA */
        .calc-box { background: #000; padding: 15px; border-radius: 8px; border: 1px dashed #444; margin: 15px 0; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sugestao { color: #25D366; font-weight: bold; font-size: 0.8rem; margin-top: 5px; display: block; text-align: center; }

        /* Toggle Switch */
        .switch-container { display: flex; align-items: center; justify-content: space-between; background: #222; padding: 12px; border-radius: 8px; margin: 10px 0; border: 1px solid #333; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--red); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Galeria */
        .preview-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .preview-item { position: relative; border: 1px solid #333; border-radius: 4px; overflow: hidden; height: 100px; background: #000; }
        .preview-item img { width: 100%; height: 100%; object-fit: contain; background: white; }
        .remove-photo { position: absolute; top: 2px; right: 2px; background: rgba(255,0,0,0.8); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-weight: bold; }
        
        /* Lista */
        .item-admin { display: flex; align-items: center; border-bottom: 1px solid #222; padding: 12px 0; gap: 12px; }
        .item-admin img { width: 50px; height: 50px; object-fit: contain; background: white; border-radius: 4px; }
        .actions { display: flex; gap: 6px; }
        .btn-edit { background: #333; width: auto; padding: 6px 12px; font-size: 0.8rem; }
        .btn-del { background: #1a1a1a; border: 1px solid #333; width: auto; padding: 6px 12px; font-size: 0.8rem; color: #888; }

        /* Destaque */
        .btn-destaque-on  { background: #ffd700; color: #000; width: auto; padding: 6px 12px; font-size: 0.75rem; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }
        .btn-destaque-off { background: #1a1a1a; border: 1px solid #444; color: #888; width: auto; padding: 6px 12px; font-size: 0.75rem; border-radius: 6px; cursor: pointer; }
        .destaque-badge { background: #ffd700; color: #000; font-size: 0.6rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
    </style>
</head>

        // --- FUNÇÃO DA CALCULADORA ---
        function calcularPreco() {
            const horas = parseFloat(document.getElementById('calc-horas').value) || 0;
            const gramas = parseFloat(document.getElementById('calc-gramas').value) || 0;
            
            // Fórmula sugerida: (Horas * 1.50€) + (Gramas * 0.05€) + 2€ margem fixa

        async function adicionarFoto() {
            const file = document.getElementById('foto-input').files[0];
            const usarIA = document.getElementById('usar-ia').checked;
            if(!file) return alert("Selecione um ficheiro!");

            const btn = document.getElementById('btn-add');
            btn.innerText = usarIA ? "Processando IA..." : "Adicionando...";
            btn.disabled = true;

            try {
                if(usarIA) {
                    const formData = new FormData();
                    formData.append("image_file", file);
                    const resp = await fetch("https://api.remove.bg/v1.0/removebg", {
                        method: "POST", headers: { "X-Api-Key": REMOVE_BG_KEY }, body: formData
                    });
                    const blob = await resp.blob();
                    fotosBlobs.push(blob);
                } else {
                    fotosBlobs.push(file);
                }
                atualizarGaleria();
            } catch (e) { alert("Erro ao processar foto."); }
            
            btn.innerText = "ADICIONAR FOTO À GALERIA";
            btn.disabled = false;
            document.getElementById('foto-input').value = "";
        }

        function atualizarGaleria() {
            const container = document.getElementById('gallery');
            container.innerHTML = "";
            fotosUrlsExistentes.forEach((url, i) => {
                container.innerHTML += `<div class="preview-item"><img src="${url}"><button class="remove-photo" onclick="removerExistente(${i})">×</button></div>`;
            });
            fotosBlobs.forEach((f, i) => {
                container.innerHTML += `<div class="preview-item"><img src="${URL.createObjectURL(f)}"><button class="remove-photo" onclick="removerBlob(${i})">×</button></div>`;
            });
        }

        function removerBlob(i) { fotosBlobs.splice(i, 1); atualizarGaleria(); }
        function removerExistente(i) { fotosUrlsExistentes.splice(i, 1); atualizarGaleria(); }

        async function confirmarSalvar() {
            const nome = document.getElementById('nome').value;

            const editId = document.getElementById('edit-id').value;
            if(!nome || !preco || (fotosBlobs.length === 0 && fotosUrlsExistentes.length === 0)) return alert("Dados insuficientes!");

            const btn = document.getElementById('btn-save');
            btn.innerText = "Salvando...";
            btn.disabled = true;

            try {
                let urlsFinais = [...fotosUrlsExistentes];
                for(let f of fotosBlobs) {
                    const name = `p_${Date.now()}_${Math.random().toString(36).substr(2,5)}.jpg`;
                    await _supabase.storage.from('fotos_pecas').upload(name, f);
                    urlsFinais.push(`${SB_URL}/storage/v1/object/public/fotos_pecas/${name}`);
                }

                const dados = {
                    nome_peca: nome,
                    categoria: document.getElementById('categoria').value,
                    preco_sugerido: parseFloat(preco).toFixed(2),
                    foto_url: urlsFinais.join(',')
                };

                if(editId) { await _supabase.from('pecas_portfolio').update(dados).eq('id', editId); }
                else { await _supabase.from('pecas_portfolio').insert(dados); }
                
                location.reload();
            } catch (e) { alert("Erro ao guardar dados."); btn.disabled = false; }
        }

        // ---- CATEGORIAS AUTOMÁTICAS ----
        let todasAsPecasAdmin = [];

        function extrairPalavrasChave(nome) {
            // Remove números, símbolos e palavras curtas — fica com palavras com 4+ letras
            return nome.toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // remove acentos
                .replace(/[^a-z\s]/g, '')
                .split(/\s+/)
                .filter(p => p.length >= 4);
        }

        function detetarCategoria(nomeNovo) {
            const palavrasNovo = extrairPalavrasChave(nomeNovo);
            if (palavrasNovo.length === 0) return null;

            // Conta quantos artigos existentes partilham palavras-chave
            const contagem = {};
            for (const peca of todasAsPecasAdmin) {
                if (peca.categoria && peca.categoria !== 'Geral') {
                    const palavrasExist = extrairPalavrasChave(peca.nome_peca);
                    const comum = palavrasNovo.filter(p => palavrasExist.includes(p));
                    if (comum.length > 0) {
                        contagem[peca.categoria] = (contagem[peca.categoria] || 0) + comum.length;
                    }
                }
            }

            // Se encontrou categoria com match, devolve a melhor
            if (Object.keys(contagem).length > 0) {
                return Object.entries(contagem).sort((a,b) => b[1]-a[1])[0][0];
            }

            // Tenta detetar nova categoria por palavras repetidas nos nomes dos artigos
            const frequencia = {};
            for (const peca of todasAsPecasAdmin) {
                const palavras = extrairPalavrasChave(peca.nome_peca);
                for (const p of palavras) {
                    if (palavrasNovo.includes(p)) {
                        frequencia[p] = (frequencia[p] || 0) + 1;
                    }
                }
            }

            // Se alguma palavra aparece em 2+ artigos, cria categoria nova
            const candidatos = Object.entries(frequencia).filter(([,v]) => v >= 1).sort((a,b) => b[1]-a[1]);
            if (candidatos.length > 0) {
                // Capitaliza a palavra para usar como categoria
                const palavra = candidatos[0][0];
                return palavra.charAt(0).toUpperCase() + palavra.slice(1) + (palavra.endsWith('s') ? '' : 's');
            }

            return null;
        }

        function atualizarSelectCategorias() {
            const cats = [...new Set(todasAsPecasAdmin.map(p => p.categoria).filter(c => c && c !== 'Geral'))].sort();
            const select = document.getElementById('categoria');
            const valorAtual = select.value;
            select.innerHTML = '<option value="Geral">Geral</option>';
            cats.forEach(c => {
                select.innerHTML += `<option value="${c}">${c}</option>`;
            });
            // Restaura valor se ainda existir
            if (valorAtual) select.value = valorAtual;
        }

        function sugerirCategoria() {
            const nome = document.getElementById('nome').value.trim();
            if (nome.length < 4) { document.getElementById('cat-sugestao').innerText = ''; return; }

            const sugestao = detetarCategoria(nome);
            const select = document.getElementById('categoria');
            const label = document.getElementById('cat-sugestao');

            if (sugestao) {
                // Verifica se já existe no select
                const existe = [...select.options].some(o => o.value === sugestao);
                if (!existe) {
                    select.innerHTML += `<option value="${sugestao}">${sugestao} ✨ nova</option>`;
                }
                select.value = sugestao;
                label.innerText = `✨ Auto: ${sugestao}`;
            } else {
                label.innerText = '';
            }
        }

        // ---- FIM CATEGORIAS AUTOMÁTICAS ----

        async function carregarBannerAdmin() {
            const { data } = await _supabase.from('config_site').select('*').eq('chave', 'banner').single();
            if (data) {
                document.getElementById('banner-ativo').checked = data.ativo;
                document.getElementById('banner-texto').value = data.valor || '';
            }
        }

        let bannerTimer;
        async function guardarBanner() {
            clearTimeout(bannerTimer);
            bannerTimer = setTimeout(async () => {
                const ativo = document.getElementById('banner-ativo').checked;
                const texto = document.getElementById('banner-texto').value;
                const status = document.getElementById('banner-status');
                const { error } = await _supabase.from('config_site').upsert({ chave: 'banner', ativo, valor: texto }, { onConflict: 'chave' });
                status.innerText = error ? '❌ Erro ao guardar' : '✅ Guardado!';
                setTimeout(() => status.innerText = '', 2000);
            }, 800);
        }

        async function carregarLista() {
            const { data } = await _supabase.from('pecas_portfolio').select('*').order('created_at', { ascending: false });
            todasAsPecasAdmin = data;
            atualizarSelectCategorias();
            document.getElementById('lista-pecas').innerHTML = data.map(p => {
                const img = p.foto_url.split(',')[0];
                return `
                <div class="item-admin">
                    <img src="${img}">
                    <div style="flex:1"><b>${p.nome_peca}</b><br><small>${p.preco_sugerido}€</small></div>
                    <div class="actions">
                        <button class="${p.destaque ? 'btn-destaque-on' : 'btn-destaque-off'}" onclick="toggleDestaque('${p.id}', ${p.destaque ? 'true' : 'false'})">${p.destaque ? '⭐ DESTAQUE' : '☆ Destacar'}</button>
                        <button class="btn-edit" onclick="editarArtigo('${p.id}', '${p.nome_peca.replace(/'/g, "\\'")}', '${p.preco_sugerido}', '${p.categoria}', '${p.foto_url}')">EDITAR</button>
                        <button class="btn-del" onclick="apagar('${p.id}')">×</button>
                    </div>
                </div>`;
            }).join('');
        }

        function editarArtigo(id, nome, preco, cat, urls) {
            document.getElementById('form-title').innerText = "Editando Artigo";
            document.getElementById('edit-id').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('preco_manual').value = preco;
            document.getElementById('categoria').value = cat;
            document.getElementById('btn-cancel').classList.remove('hidden');
            fotosUrlsExistentes = urls.split(',').filter(u => u !== "");
            fotosBlobs = [];
            atualizarGaleria();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function apagar(id) { if(confirm("Eliminar artigo?")) { await _supabase.from('pecas_portfolio').delete().eq('id', id); carregarLista(); } }
        
        async function toggleDestaque(id, estadoAtual) {
            const novoEstado = !estadoAtual;
            await _supabase.from('pecas_portfolio').update({ destaque: novoEstado }).eq('id', id);
            
            if (novoEstado) {
                const { data } = await _supabase.from('pecas_portfolio').select('*').eq('id', id).single();
                const resposta = confirm(`✨ Artigo "${data.nome_peca}" destacado!\n\nQueres gerar um post automático para o Instagram com IA?`);

                            📋 Copiar e Abrir Instagram
                        </button>
                        <button onclick="document.getElementById('modal-ig').remove()" style="padding:12px 16px;background:#222;color:#888;border:1px solid #333;border-radius:8px;cursor:pointer;font-size:0.8rem;">
                            ✕
                        </button>
                    </div>
                    <p style="color:#555;font-size:0.68rem;text-align:center;margin-top:8px;">Podes editar o texto antes de copiar</p>
                </div>`;
            document.body.appendChild(modal);
        }

        function copiarEAbrirIG() {
            const texto = document.getElementById('texto-post').value;
            navigator.clipboard.writeText(texto).then(() => {
                alert('✅ Legenda copiada! Vai ser redirecionado para o Instagram.\n\nCola o texto na publicação (Ctrl+V).');
                document.getElementById('modal-ig').remove();
                window.open('https://www.instagram.com/ds_3dprint', '_blank');
            });
        }

        function logout() { localStorage.removeItem('ds_logged'); location.reload(); }
    </script>
