<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Oficial | DS 3D PRINT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @page { size: A4; margin: 0; }
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --text: #ffffff;
            --accent: #ff4d4d;
            --gray: #888;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #222; margin: 0; color: var(--text);
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .print-container { width: 210mm; margin: 0 auto; background: var(--bg); position: relative; }

        /* --- CAPA --- */
        .capa {
            height: 297mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://wxwdvixxcrduzneqjfwo.supabase.co/storage/v1/object/public/fotos_pecas/fundo.png');
            background-size: cover;
            page-break-after: always;
        }
        .logo-capa { max-width: 175mm; filter: drop-shadow(0 0 25px var(--accent)); }
        
        .insta-capa { 
            margin-top: 20px; 
            font-size: 22pt; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-weight: 600;
        }
        .insta-capa i { color: var(--accent); font-size: 26pt; }

        .slogan-capa { 
            color: var(--accent); 
            font-size: 26pt; 
            letter-spacing: 10px; 
            margin-top: 40px; 
            text-transform: uppercase; 
            font-weight: 900; 
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.6); 
        }

        /* --- CABEÇALHO PAGINAS INTERNAS --- */
        table { width: 100%; border-collapse: collapse; }
        thead { display: table-header-group; }
        
        .header-content {
            padding: 20px 0;
            text-align: center;
            background: #000;
            border-bottom: 2px solid var(--accent);
        }
        .logo-pequena { max-height: 60px; filter: drop-shadow(0 0 10px var(--accent)); }
        .header-title {
            color: var(--accent);
            font-size: 22pt;
            font-weight: 900;
            margin: 5px 0 0;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.8);
        }

        /* --- CATEGORIAS --- */
        .category-separator {
            color: var(--accent);
            padding: 15px 0 5px 0;
            font-size: 14pt;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            margin: 10px 15mm 10px 15mm;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- GRELHA (4 POR LINHA) --- */
        .grid-container { padding: 0 15mm; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
        }

        .item { 
            background: var(--card-bg); 
            border: 1px solid #222; 
            padding: 8px; 
            text-align: center; 
            page-break-inside: avoid; 
            border-radius: 6px;
        }
        .item img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #fff; margin-bottom: 6px; border-radius: 4px; }
        .item-nome { font-weight: bold; font-size: 7.5pt; text-transform: uppercase; min-height: 25px; display: flex; align-items: center; justify-content: center; line-height: 1.1; }
        .item-preco { font-size: 11pt; font-weight: 800; color: var(--accent); border-top: 1px solid #333; padding-top: 4px; margin-top: 4px; }

        /* --- RODAPÉ COM CONTACTOS A VERMELHO --- */
        .footer-content { 
            text-align: center; 
            padding: 15px 0; 
            background: #000; 
            border-top: 2px solid var(--accent);
        }
        .contact-row { display: flex; justify-content: center; gap: 40px; align-items: center; }
        
        .contact-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 900; 
            font-size: 14pt; 
            color: var(--accent); /* CONTACTO A VERMELHO */
            text-shadow: 0 0 5px rgba(255, 77, 77, 0.3);
        }
        .contact-item i { font-size: 16pt; }

        .web-link { 
            color: var(--gray); 
            font-size: 8pt; 
            margin-top: 8px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        .btn-print { 
            position: fixed; bottom: 30px; right: 30px; 
            background: var(--accent); color: white; padding: 15px 30px; 
            border: none; border-radius: 5px; font-weight: bold; 
            cursor: pointer; z-index: 1000; text-transform: uppercase;
        }

        @media print {
            body { background: var(--bg); }
            .print-container { width: 100%; margin: 0; }
            .no-print { display: none; }
            .footer-content { position: fixed; bottom: 0; left: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <button class="btn-print no-print" onclick="window.print()">
        <i class="fas fa-print"></i> IMPRIMIR CATÁLOGO
    </button>

    <div class="print-container">
        <div class="capa">
            <img src="https://wxwdvixxcrduzneqjfwo.supabase.co/storage/v1/object/public/fotos_pecas/logo.png" class="logo-capa">
            <div class="insta-capa">
                <i class="fab fa-instagram"></i> ds_3dprint
            </div>
            <div class="slogan-capa">Catálogo de Produtos</div>
        </div>

        <table>
            <thead>
                <tr>
                    <td>
                        <div class="header-content">
                            <img src="https://wxwdvixxcrduzneqjfwo.supabase.co/storage/v1/object/public/fotos_pecas/logo.png" class="logo-pequena">
                            <h1 class="header-title">DS 3D PRINT</h1>
                        </div>
                    </td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <div id="dynamic-content">
                            </div>
                        <div style="height: 40mm;"></div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="footer-content">
            <div class="contact-row">
                <div class="contact-item">
                    <i class="fab fa-whatsapp"></i> 911 780 404
                </div>
                <div class="contact-item">
                    <i class="fab fa-instagram"></i> ds_3dprint
                </div>
            </div>
            <div class="web-link">
                ds-3d-print.vercel.app
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://wxwdvixxcrduzneqjfwo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4d2R2aXh4Y3JkdXpuZXFqZndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTg0MDEsImV4cCI6MjA4Nzc5NDQwMX0.WKs7b9PMec_AxbU2TThK_TdiyhN8pamiUFN1H2z36aM";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function carregar() {
            const { data } = await _supabase.from('pecas_portfolio').select('*')
                .order('categoria', { ascending: true })
                .order('nome_peca', { ascending: true });
            
            const container = document.getElementById('dynamic-content');
            const categorias = [...new Set(data.map(p => p.categoria || 'Geral'))];
            let html = "";

            categorias.forEach(cat => {
                html += `<div class="category-separator"><i class="fas fa-tag"></i> ${cat}</div>`;
                html += `<div class="grid-container"><div class="grid">`;
                
                const pecas = data.filter(p => (p.categoria || 'Geral') === cat);
                pecas.forEach(p => {
                    const img = p.foto_url.split(',')[0].trim();
                    html += `
                        <div class="item">
                            <img src="${img}">
                            <div class="item-nome">${p.nome_peca}</div>
                            <div class="item-preco">${p.preco_sugerido}€</div>
                        </div>`;
                });
                
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }
        carregar();
    </script>
</body>
</html>
