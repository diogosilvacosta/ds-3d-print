<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo DS 3D PRINT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- CONFIGURAÇÃO DE IMPRESSÃO A4 --- */
        @page {
            size: A4;
            margin: 10mm;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #f0f0f0; 
            margin: 0; 
            color: #1a1a1a;
        }

        .print-container {
            width: 210mm;
            margin: 20px auto;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* Repetição do Cabeçalho em todas as páginas */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            display: table-header-group;
        }

        .header-content {
            padding: 35px 20px;
            text-align: center;
            border-bottom: 6px solid #ff4d4d;
        }

        .logo { 
            max-height: 110px; 
            margin-bottom: 15px;
        }

        h1 { margin: 10px 0 5px; font-size: 28pt; text-transform: uppercase; letter-spacing: 2px; color: #000; }
        
        /* NOVO SLOGAN */
        .slogan { 
            color: #ff4d4d; 
            font-size: 16pt; 
            font-weight: 800; 
            margin: 5px 0; 
            text-transform: italic;
        }

        /* Grelha de Produtos */
        .grid-container {
            padding: 25px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
        }

        .item { 
            border: 1px solid #eee; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            page-break-inside: avoid;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item img { 
            width: 100%; 
            aspect-ratio: 1; 
            object-fit: contain; 
            background: #fdfdfd; 
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .item-nome { 
            font-weight: 700; 
            color: #333; 
            font-size: 13pt; 
            margin-bottom: 10px;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-preco { 
            font-size: 18pt; 
            font-weight: 900; 
            color: #000; 
            border-top: 2px solid #ff4d4d; 
            padding-top: 10px; 
        }

        /* Rodapé com Contacto e Estilo */
        .footer-content {
            text-align: center;
            padding: 40px;
            background: #fafafa;
            border-top: 2px solid #eee;
        }

        .contacto-box {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366; /* Cor do WhatsApp */
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 18pt;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn-print { 
            position: fixed; bottom: 30px; right: 30px; 
            background: #ff4d4d; color: white; padding: 18px 35px; 
            border: none; border-radius: 50px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 5px 20px rgba(255, 77, 77, 0.5); z-index: 1000;
            font-size: 1.1rem;
        }

        @media print {
            body { background: white; }
            .print-container { width: 100%; margin: 0; box-shadow: none; }
            .no-print { display: none; }
            .item { border: 1px solid #ddd; }
            .contacto-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <button class="btn-print no-print" onclick="window.print()">🖨️ IMPRIMIR / GERAR PDF</button>

    <div class="print-container">
        <table>
            <thead>
                <tr>
                    <td>
                        <div class="header-content">
                            <img src="https://wxwdvixxcrduzneqjfwo.supabase.co/storage/v1/object/public/fotos_pecas/logo_ds.png" 
                                 class="logo" 
                                 onerror="this.onerror=null; this.src='https://wxwdvixxcrduzneqjfwo.supabase.co/storage/v1/object/public/fotos_pecas/logo.png';">
                            <h1>DS 3D PRINT</h1>
                            <div class="slogan">"VOCÊ PENSA, NÓS FAZEMOS"</div>
                        </div>
                    </td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <div class="grid-container">
                            <div class="grid" id="catalogo-grid">
                                </div>
                        </div>
                    </td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td>
                        <div class="footer-content">
                            <div class="contacto-box">
                                <span>📱 911 780 404</span>
                            </div>
                            <p style="margin: 10px 0; font-weight: bold; color: #444;">ds-3d-print.vercel.app</p>
                            <p style="font-size: 9pt; color: #999;">Catálogo gerado para apresentação de portfólio.</p>
                        </div>
                    </td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script>
        const SB_URL = "https://wxwdvixxcrduzneqjfwo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4d2R2aXh4Y3JkdXpuZXFqZndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTg0MDEsImV4cCI6MjA4Nzc5NDQwMX0.WKs7b9PMec_AxbU2TThK_TdiyhN8pamiUFN1H2z36aM";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function carregarCatalogo() {
            const { data, error } = await _supabase
                .from('pecas_portfolio')
                .select('*')
                .order('nome_peca', { ascending: true });

            if (error) return;

            const grid = document.getElementById('catalogo-grid');
            grid.innerHTML = data.map(p => `
                <div class="item">
                    <img src="${p.foto_url}" onerror="this.src='https://via.placeholder.com/300/f3f3f3/999?text=DS+3D+PRINT'">
                    <div class="item-nome">${p.nome_peca}</div>
                    <div class="item-preco">${p.preco_sugerido}€</div>
                </div>
            `).join('');
        }
        carregarCatalogo();
    </script>
</body>
</html>
