<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo DS 3D PRINT | Professional PDF</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CONFIGURAÇÃO DE IMPRESSÃO --- */
        @page {
            size: A4;
            margin: 0;
        }

        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --text: #ffffff;
            --accent: #ff4d4d;
            --gray: #888;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: #222; 
            margin: 0; 
            color: var(--text);
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .print-container {
            width: 210mm;
            margin: 0 auto;
            background: var(--bg);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            min-height: 297mm;
        }

        /* TABELA PARA REPETIR CABEÇALHO */
        table { width: 100%; border-collapse: collapse; }
        
        /* O segredo para repetir o topo em cada página */
        thead { display: table-header-group; }

        .header-content {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://wxwdvixxcrduzneqjfwo.supabase.co/storage/v1/object/public/fotos_pecas/fundo.png');
            background-size: cover;
            background-position: center;
            border-bottom: 4px solid var(--accent);
        }

        .logo { 
            max-height: 80px; 
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        h1 { margin: 0; font-size: 28pt; font-weight: 900; letter-spacing: -1px; color: #fff; line-height: 1; }
        
        .slogan { 
            color: var(--accent); 
            font-size: 11pt; 
            font-weight: 300; 
            margin-top: 8px; 
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* TÍTULOS DE CATEGORIA */
        .category-separator {
            grid-column: 1 / -1;
            background: #1a1a1a;
            color: var(--accent);
            padding: 12px 20px;
            font-size: 14pt;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-left: 5px solid var(--accent);
            margin: 20px 0 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* GRELHA DE 4 PRODUTOS */
        .grid-container { padding: 20px 15px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
        }

        .item { 
            background: var(--card-bg);
            border: 1px solid #222; 
            padding: 10px; 
            text-align: center; 
            page-break-inside: avoid; 
            display: flex;
            flex-direction: column;
            border-radius: 4px;
        }

        .item img { 
            width: 100%; 
            aspect-ratio: 1; 
            object-fit: contain; 
            background: #fff; 
            margin-bottom: 10px;
            border-radius: 2px;
        }

        .item-nome { 
            font-weight: bold; 
            color: #fff; 
            font-size: 8.5pt; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .item-preco { 
            font-size: 14pt; 
            font-weight: 800; 
            color: var(--accent); 
            border-top: 1px solid #333; 
            padding-top: 8px; 
        }

        /* RODAPÉ */
        .footer-content {
            text-align: center;
            padding: 30px 20px;
            background: #000;
            border-top: 1px solid #222;
        }

        .wa-box {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #25D366;
            font-size: 16pt;
            font-weight: bold;
        }

        .web-link {
            color: var(--gray);
            font-size: 9pt;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* BOTÃO FLUTUANTE */
        .btn-print { 
            position: fixed; bottom: 30px; right: 30px; 
            background: var(--accent); color: white; padding: 15px 30px; 
            border: none; border-radius: 5px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 1000;
            text-transform: uppercase;
            display: flex; align-items: center; gap: 10px;
        }

        @media print {
            body { background: var(--bg); }
            .print-container { width: 100%; margin: 0; box-shadow: none; }
            .no-print { display: none; }
            .header-content, .category-separator { -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <button class="btn-print no-print" onclick="window.print()">
        <i class="fas fa-print"></i> GERAR PDF POR CATEGORIAS
    </button>

    <div class="print-container">
        <table>
            <thead>
                <tr>
                    <td>
                        <div class="header-content">
                            <img src="https://wxwdvixxcrduzneqjfwo.supabase.co/storage/v1/object/public/fotos_pecas/logo.png" class="logo">
                            <h1>DS 3D PRINT</h1>
                            <div class="slogan">VOCÊ PENSA, NÓS FAZEMOS</div>
                        </div>
                    </td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <div class="grid-container">
                            <div class="grid" id="catalogo-grid">
                                </div>
                        </div>
                    </td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td>
                        <div class="footer-content">
                            <div class="wa-box">
                                <i class="fab fa-whatsapp"></i> <span>911 780 404</span>
                            </div>
                            <div class="web-link">ds-3d-print.vercel.app</div>
                        </div>
                    </td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script>
        const SB_URL = "https://wxwdvixxcrduzneqjfwo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4d2R2aXh4Y3JkdXpuZXFqZndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTg0MDEsImV4cCI6MjA4Nzc5NDQwMX0.WKs7b9PMec_AxbU2TThK_TdiyhN8pamiUFN1H2z36aM";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function carregarCatalogo() {
            const { data, error } = await _supabase
                .from('pecas_portfolio')
                .select('*')
                .order('categoria', { ascending: true })
                .order('nome_peca', { ascending: true });

            if (error) return;

            const grid = document.getElementById('catalogo-grid');
            
            // Agrupar por categoria
            const categorias = [...new Set(data.map(p => p.categoria || 'Geral'))];
            
            let htmlFinal = "";

            categorias.forEach(cat => {
                // Título da Secção
                htmlFinal += `
                    <div class="category-separator">
                        <i class="fas fa-tag"></i> ${cat}
                    </div>
                `;

                // Peças da Secção
                const pecasDaCat = data.filter(p => (p.categoria || 'Geral') === cat);
                
                pecasDaCat.forEach(p => {
                    htmlFinal += `
                        <div class="item">
                            <img src="${p.foto_url}" onerror="this.src='https://via.placeholder.com/300/111/333?text=DS+3D+PRINT'">
                            <div class="item-nome">${p.nome_peca}</div>
                            <div class="item-preco">${p.preco_sugerido}€</div>
                        </div>
                    `;
                });
            });

            grid.innerHTML = htmlFinal;
        }
        carregarCatalogo();
    </script>
</body>
</html>
