<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS 3D PRINT | Engenharia & Design</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --text: #ffffff;
            --accent: #ff4d4d;
            --accent-hover: #cc0000;
            --gray: #888;
            --gold: #ffd700;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* HERO */
        .hero {
            height: 45vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://wxwdvixxcrduzneqjfwo.supabase.co/storage/v1/object/public/fotos_pecas/fundo.png');
            background-size: cover; background-position: center; background-attachment: fixed; padding: 20px;
        }
        .logo-hero { max-height: 80px; margin-bottom: 15px; filter: drop-shadow(0 0 15px var(--accent)); }
        h1 { font-size: clamp(1.8rem, 6vw, 2.5rem); margin: 0; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }

        /* BOTÕES DE CONTACTO RÁPIDO */
        .quick-contacts { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .contact-chip { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 10px 18px; border-radius: 50px; text-decoration: none;
            font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 8px;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        .contact-chip:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-2px); }
        .contact-chip i { font-size: 1rem; }

        /* FERRAMENTAS (PESQUISA + ORDENAÇÃO) */
        .tools-section { max-width: 1200px; margin: -30px auto 0; padding: 0 15px; position: relative; z-index: 10; }
        .tools-container { 
            display: flex; gap: 15px; flex-wrap: wrap; background: var(--card-bg); 
            padding: 15px; border-radius: 12px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-wrapper { position: relative; flex: 2; min-width: 250px; }
        .search-input { 
            width: 100%; padding: 12px 12px 12px 40px; background: #000; 
            border: 1px solid #333; border-radius: 8px; color: white; outline: none; font-size: 0.9rem;
        }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--accent); }
        .sort-select { 
            flex: 1; min-width: 150px; padding: 12px; background: #000; 
            border: 1px solid #333; border-radius: 8px; color: white; font-size: 0.85rem; cursor: pointer; 
        }

        /* FILTROS CATEGORIAS */
        .filters { display: flex; justify-content: center; gap: 8px; margin: 30px auto; flex-wrap: wrap; max-width: 1200px; padding: 0 15px; }
        .filter-btn { background: #111; color: #fff; border: 1px solid #222; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); }

        /* DESTAQUES */
        .destaque-section { padding: 20px 15px; max-width: 1200px; margin: 0 auto 40px; }
        .destaque-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }

        /* GRID PRINCIPAL */
        section { padding: 0 15px 40px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* CARDS */
        .card { background: var(--card-bg); border: 1px solid #222; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .carousel { position: relative; width: 100%; aspect-ratio: 1; background: #fff; }
        .carousel-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; height: 100%; }
        .carousel-track img { min-width: 100%; height: 100%; object-fit: contain; scroll-snap-align: start; }
        .dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 5; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 15px; }
        .dot { width: 5px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--accent); width: 12px; border-radius: 3px; }

        .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-nome { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: #fff; margin-bottom: 5px; min-height: 2.4em; }
        .preco { font-size: 1.3rem; color: var(--accent); font-weight: 900; margin-bottom: 12px; }
        .order-row { display: flex; gap: 8px; align-items: center; }
        .qty { width: 45px; background: #000; border: 1px solid #333; color: white; padding: 8px 2px; text-align: center; border-radius: 5px; }
        .btn-order { flex: 1; background: var(--accent); color: white; border: none; padding: 10px; font-weight: bold; border-radius: 6px; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; }

        .wa-float { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .wa-btn { background: #25D366; color: white; padding: 14px 22px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; }

        @media (max-width: 600px) { 
            .tools-section { margin-top: 10px; }
            .wa-btn span { display: none; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <img src="https://wxwdvixxcrduzneqjfwo.supabase.co/storage/v1/object/public/fotos_pecas/logo.png" class="logo-hero">
        <h1>DS 3D PRINT</h1>
        
        <div class="quick-contacts">
            <a href="https://wa.me/351911780404" class="contact-chip" target="_blank">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            <a href="https://www.instagram.com/ds_3dprint" class="contact-chip" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="tel:+351911780404" class="contact-chip">
                <i class="fas fa-phone-alt"></i> Ligar
            </a>
        </div>
    </div>

    <div class="tools-section">
        <div class="tools-container">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Pesquisar produto...">
            </div>
            <select id="sort-select" class="sort-select">
                <option value="recentes">Novidades</option>
                <option value="crescente">Preço: Baixo para Alto</option>
                <option value="decrescente">Preço: Alto para Baixo</option>
            </select>
        </div>
    </div>

    <div class="filters" id="category-filters"></div>

    <div class="destaque-section" id="destaque-section" style="display:none;">
        <h2 style="font-size: 0.8rem; color: var(--gold); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 2px;">⭐ Em Destaque</h2>
        <div class="destaque-grid" id="destaque-grid"></div>
    </div>

    <section>
        <div class="grid" id="portfolio-grid"></div>
    </section>

    <div class="wa-float" id="wa-float" style="display:none;">
        <a href="https://wa.me/351911780404" class="wa-btn" target="_blank">
            <i class="fab fa-whatsapp"></i> <span>Dúvidas?</span>
        </a>
    </div>

    <script>
        const SB_URL = "https://wxwdvixxcrduzneqjfwo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4d2R2aXh4Y3JkdXpuZXFqZndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMTg0MDEsImV4cCI6MjA4Nzc5NDQwMX0.WKs7b9PMec_AxbU2TThK_TdiyhN8pamiUFN1H2z36aM";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let todasAsPecas = [];
        let categoriaAtiva = 'Todas';

        const regrasCategorias = [
            { chave: 'suporte', nome: 'Suportes' },
            { chave: 'vaso', nome: 'Vasos' },
            { chave: 'articulado', nome: 'Articulados' },
            { chave: 'organizador', nome: 'Organizadores' },
            { chave: 'jarra', nome: 'Jarras' }
        ];

        async function carregar() {
            const { data } = await _supabase.from('pecas_portfolio').select('*').order('created_at', { ascending: false });
            
            todasAsPecas = data.map(p => {
                let catAuto = p.categoria && p.categoria !== 'Geral' ? p.categoria : null;
                const nomeLow = p.nome_peca.toLowerCase();
                if (!catAuto) {
                    for (let regra of regrasCategorias) {
                        if (nomeLow.includes(regra.chave)) {
                            catAuto = regra.nome;
                            break;
                        }
                    }
                }
                return { ...p, categoria_final: catAuto || 'Outros' };
            });

            const categoriasUnicas = [...new Set(todasAsPecas.map(p => p.categoria_final))].sort();
            const fDiv = document.getElementById('category-filters');
            fDiv.innerHTML = `<button class="filter-btn active" onclick="setCat('Todas', this)">Todas</button>`;
            categoriasUnicas.forEach(cat => {
                fDiv.innerHTML += `<button class="filter-btn" onclick="setCat('${cat}', this)">${cat}</button>`;
            });

            const emDestaque = todasAsPecas.filter(p => p.destaque);
            if (emDestaque.length > 0) {
                document.getElementById('destaque-section').style.display = 'block';
                document.getElementById('destaque-grid').innerHTML = emDestaque.map(p => criarCard(p, 'dest')).join('');
            }
            renderizar();
        }

        function renderizar() {
            const termo = document.getElementById('search-input').value.toLowerCase();
            const sort = document.getElementById('sort-select').value;
            const grid = document.getElementById('portfolio-grid');
            let filtrados = todasAsPecas.filter(p => {
                const matchCat = (categoriaAtiva === 'Todas') || (p.categoria_final === categoriaAtiva);
                const matchSearch = p.nome_peca.toLowerCase().includes(termo);
                return matchCat && matchSearch;
            });
            if (sort === 'crescente') filtrados.sort((a,b) => a.preco_sugerido - b.preco_sugerido);
            else if (sort === 'decrescente') filtrados.sort((a,b) => b.preco_sugerido - a.preco_sugerido);
            else filtrados.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            grid.innerHTML = filtrados.map(p => criarCard(p, '')).join('');
        }

        function criarCard(p, prefix) {
            const fotos = p.foto_url.split(',');
            const id = prefix ? `${prefix}-${p.id}` : p.id;
            return `
                <div class="card ${prefix==='dest'?'card-destaque':''}">
                    <div class="carousel">
                        <div class="carousel-track" onscroll="updateDots(this, '${id}')">
                            ${fotos.map(url => `<img src="${url.trim()}" loading="lazy">`).join('')}
                        </div>
                        ${fotos.length > 1 ? `<div class="dots" id="dots-${id}">${fotos.map((_,i) => `<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>` : ''}
                    </div>
                    <div class="card-info">
                        <div>
                            <div class="card-nome">${p.nome_peca}</div>
                            <div class="preco">${p.preco_sugerido}€</div>
                        </div>
                        <div class="order-row">
                            <input type="number" id="qtd-${id}" value="1" min="1" class="qty">
                            <button onclick="encomendar('${p.nome_peca.replace(/'/g, "\\'")}', '${id}', ${p.preco_sugerido})" class="btn-order">Encomendar</button>
                        </div>
                    </div>
                </div>`;
        }

        function setCat(c, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            categoriaAtiva = c;
            renderizar();
        }

        function updateDots(track, id) {
            const dotsContainer = document.getElementById(`dots-${id}`);
            if (!dotsContainer) return;
            const index = Math.round(track.scrollLeft / track.offsetWidth);
            const dots = dotsContainer.querySelectorAll('.dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
        }

        function encomendar(nome, id, preco) {
            const qtd = document.getElementById(`qtd-${id}`).value;
            window.open(`https://wa.me/351911780404?text=Olá Diogo! Gostaria de encomendar:\n\n🛠️ *Projeto:* ${nome}\n🔢 *Qtd:* ${qtd}\n💰 *Total:* ${(qtd*preco).toFixed(2)}€`, '_blank');
        }

        document.getElementById('search-input').addEventListener('input', renderizar);
        document.getElementById('sort-select').addEventListener('change', renderizar);

        carregar();
        setTimeout(() => { document.getElementById('wa-float').style.display = 'flex'; }, 2000);
    </script>
</body>
</html>
